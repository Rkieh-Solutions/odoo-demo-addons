        // --- Packing Algorithm (MaxRects Bottom-Left) ---
        class MaxRectsPacker {
            constructor(width, height, kerf = 0) {
                this.width = width;
                this.height = height;
                this.kerf = kerf;
                this.freeRects = [{ x: 0, y: 0, w: width, h: height }];
                this.packedRects = [];
            }

            pack(piece, allowRotation = true) {
                let bestNode = null;
                let bestY = Infinity;
                let bestX = Infinity;
                let rotate = false;

                for (const fr of this.freeRects) {
                    // Try normal orientation
                    if (fr.w >= piece.width && fr.h >= piece.height) {
                        if (fr.y < bestY || (fr.y === bestY && fr.x < bestX)) {
                            bestNode = { x: fr.x, y: fr.y, w: piece.width, h: piece.height };
                            bestY = fr.y;
                            bestX = fr.x;
                            rotate = false;
                        }
                    }

                    // Try rotated orientation
                    if (allowRotation && piece.width !== piece.height) {
                        if (fr.w >= piece.height && fr.h >= piece.width) {
                            if (fr.y < bestY || (fr.y === bestY && fr.x < bestX)) {
                                bestNode = { x: fr.x, y: fr.y, w: piece.height, h: piece.width };
                                bestY = fr.y;
                                bestX = fr.x;
                                rotate = true;
                            }
                        }
                    }
                }

                if (!bestNode) return null;

                // The used space includes kerf gap after the piece
                const usedRect = {
                    x: bestNode.x,
                    y: bestNode.y,
                    w: bestNode.w + this.kerf,
                    h: bestNode.h + this.kerf
                };

                // Split all overlapping free rectangles
                const newFreeRects = [];
                for (const fr of this.freeRects) {
                    if (this.intersects(fr, usedRect)) {
                        // Right remainder
                        if (usedRect.x + usedRect.w < fr.x + fr.w) {
                            newFreeRects.push({
                                x: usedRect.x + usedRect.w,
                                y: fr.y,
                                w: (fr.x + fr.w) - (usedRect.x + usedRect.w),
                                h: fr.h
                            });
                        }
                        // Bottom remainder
                        if (usedRect.y + usedRect.h < fr.y + fr.h) {
                            newFreeRects.push({
                                x: fr.x,
                                y: usedRect.y + usedRect.h,
                                w: fr.w,
                                h: (fr.y + fr.h) - (usedRect.y + usedRect.h)
                            });
                        }
                        // Left remainder
                        if (usedRect.x > fr.x) {
                            newFreeRects.push({
                                x: fr.x,
                                y: fr.y,
                                w: usedRect.x - fr.x,
                                h: fr.h
                            });
                        }
                        // Top remainder
                        if (usedRect.y > fr.y) {
                            newFreeRects.push({
                                x: fr.x,
                                y: fr.y,
                                w: fr.w,
                                h: usedRect.y - fr.y
                            });
                        }
                    } else {
                        newFreeRects.push(fr);
                    }
                }

                this.freeRects = this.pruneFreeList(newFreeRects);
                
                const packed = { ...piece, ...bestNode, rotated: rotate };
                this.packedRects.push(packed);
                return packed;
            }

            intersects(a, b) {
                return !(b.x >= a.x + a.w || b.x + b.w <= a.x || b.y >= a.y + a.h || b.y + b.h <= a.y);
            }

            pruneFreeList(list) {
                // Remove invalid rects
                list = list.filter(r => r.w > 1 && r.h > 1);
                // Remove sub-rectangles
                for (let i = list.length - 1; i >= 0; i--) {
                    for (let j = 0; j < list.length; j++) {
                        if (i !== j && this.contains(list[j], list[i])) {
                            list.splice(i, 1);
                            break;
                        }
                    }
                }
                return list;
            }

            contains(a, b) {
                return b.x >= a.x && b.y >= a.y && b.x + b.w <= a.x + a.w && b.y + b.h <= a.y + a.h;
            }
        }

        const Optimizer = ({ 
            setView, customTemplates, setCustomTemplates, history, setHistory, materials, setMaterials,
            board, setBoard, projectName, setProjectName, pieces, setPieces 
        }) => {
            const [results, setResults] = useState(null);
            const [showDashboard, setShowDashboard] = useState(false);
            const [showMaterialModal, setShowMaterialModal] = useState(false);
            const [error, setError] = useState(null);
            const [templateSearch, setTemplateSearch] = useState('');
            const [isLibraryFocused, setIsLibraryFocused] = useState(false);
            const [materialSearch, setMaterialSearch] = useState('');
            const [isMaterialFocused, setIsMaterialFocused] = useState(false);
            
            useEffect(() => {
                localStorage.setItem('woodcut_templates', JSON.stringify(customTemplates));
            }, [customTemplates]);

            useEffect(() => {
                localStorage.setItem('woodcut_materials', JSON.stringify(materials));
            }, [materials]);

            useEffect(() => {
                if (board?.name && !isMaterialFocused) {
                    setMaterialSearch(board.name);
                }
            }, [board?.name]);

            // Automatically calculate required board quantity based on pieces area
            useEffect(() => {
                if (!pieces || pieces.length === 0) {
                    setBoard(prev => ({ ...prev, quantity: 1 }));
                    return;
                }
                
                const boardArea = board.width * board.height;
                if (boardArea <= 0) return;

                const totalPiecesArea = pieces.reduce((sum, p) => {
                    // Add kerf to piece dimensions for area estimation
                    const w = p.width + (board.kerf || 0);
                    const h = p.height + (board.kerf || 0);
                    return sum + (w * h * (p.quantity || 1));
                }, 0);

                // Estimate boards needed (add 20% margin for packing inefficiency)
                const estimatedBoards = Math.max(1, Math.ceil((totalPiecesArea * 1.2) / boardArea));
                
                if (board.quantity !== estimatedBoards) {
                    setBoard(prev => ({ ...prev, quantity: estimatedBoards }));
                }
            }, [pieces, board.width, board.height, board.kerf]);

            const saveMaterialToLibrary = () => {
                if (board.name && !(materials || []).find(m => m.name === board.name)) {
                    setMaterials(prev => [...(Array.isArray(prev) ? prev : []), { ...board }]);
                }
            };

            const removeMaterialFromLibrary = (name) => {
                setMaterials(prev => (Array.isArray(prev) ? prev : []).filter(m => m.name !== name));
            };

            const addPiece = () => {
                const newPiece = { 
                    id: Math.random().toString(36).substr(2, 9), 
                    name: `Piece ${(pieces || []).length + 1}`, 
                    width: 40, 
                    height: 20, 
                    quantity: 1, 
                    allowRotation: true,
                    completed: false
                };
                setPieces(prev => [...(Array.isArray(prev) ? prev : []), newPiece]);
            };

            const updatePiece = (id, field, value) => {
                setPieces(prev => (Array.isArray(prev) ? prev : []).map(p => p.id === id ? { ...p, [field]: value } : p));
            };

            const removePiece = (id) => {
                setPieces(prev => (Array.isArray(prev) ? prev : []).filter(p => p.id !== id));
            };

            const saveCurrentAsTemplate = () => {
                const name = projectName || prompt("Enter template name:", board.name || "My Project");
                if (name) {
                    const newTemplate = { 
                        name, 
                        pieces: JSON.parse(JSON.stringify(pieces)),
                        board: { ...board },
                        projectName: name,
                        results: results ? JSON.parse(JSON.stringify(results)) : null
                    };
                    
                    const existingIdx = (customTemplates || []).findIndex(t => 
                        (t?.projectName || t?.name || '').toLowerCase() === name.toLowerCase()
                    );
                    if (existingIdx >= 0) {
                        if(confirm(`A project named "${name}" already exists. Overwrite?`)) {
                            setCustomTemplates(prev => {
                                const updated = [...(Array.isArray(prev) ? prev : [])];
                                updated[existingIdx] = newTemplate;
                                return updated;
                            });
                            alert('Project updated!');
                        }
                    } else {
                        setCustomTemplates(prev => [newTemplate, ...(Array.isArray(prev) ? prev : [])]);
                        alert('Project saved to library!');
                    }
                }
            };

            const loadTemplate = (template) => {
                if (!template) return;
                if (template.board) setBoard({ ...template.board });
                setProjectName(template.projectName || template.name || 'Saved Project');
                if (template.pieces && Array.isArray(template.pieces)) {
                    setPieces([...template.pieces.map(p => ({ ...p, id: Math.random().toString(36).substr(2, 9) }))]);
                }
                if (template.results) {
                    setResults(template.results);
                }
            };

            const addOffcutsToInventory = (boardIdx) => {
                const b = results.boards.find(brd => brd.boardIndex === boardIdx);
                if (b && b.offCuts.length > 0) {
                    const largest = b.offCuts.sort((a, b) => (b.w * b.h) - (a.width * a.height))[0];
                    setBoard({ ...board, width: largest.w, height: largest.h, quantity: 1, name: `Off-cut from ${board.name}` });
                    alert(`Added ${largest.w.toFixed(1)}x${largest.h.toFixed(1)} off-cut as your new board.`);
                }
            };

            const loadSampleData = () => {
                setBoard({ material: 'MDF 18mm', width: 244, height: 122, kerf: 0.3, quantity: 5, unit: 'cm' });
                setPieces([
                    { id: '1', name: 'Table Top', width: 180, height: 90, quantity: 1, allowRotation: true },
                    { id: '2', name: 'Legs', width: 75, height: 10, quantity: 4, allowRotation: false },
                    { id: '3', name: 'Support', width: 160, height: 8, quantity: 2, allowRotation: true },
                    { id: '4', name: 'Side Brace', width: 80, height: 8, quantity: 2, allowRotation: true },
                    { id: '5', name: 'Shelf', width: 40, height: 40, quantity: 6, allowRotation: true }
                ]);
                setResults(null);
            };

            const downloadBoardImage = (boardIdx) => {
                const b = results.boards.find(brd => brd.boardIndex === boardIdx);
                if (!b) return;

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const scale = 5; // High res
                canvas.width = board.width * scale;
                canvas.height = board.height * scale;

                // Draw Wood Background
                ctx.fillStyle = '#d7ccc8';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw Border
                ctx.strokeStyle = '#3e2723';
                ctx.lineWidth = 10;
                ctx.strokeRect(0, 0, canvas.width, canvas.height);

                // Draw Pieces
                b.pieces.forEach(p => {
                    ctx.fillStyle = 'rgba(121, 85, 72, 0.9)';
                    ctx.fillRect(p.x * scale, p.y * scale, p.w * scale, p.h * scale);
                    ctx.strokeStyle = '#3e2723';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(p.x * scale, p.y * scale, p.w * scale, p.h * scale);

                    // Text
                    ctx.fillStyle = 'white';
                    ctx.font = `bold ${10 * scale}px Inter, sans-serif`;
                    ctx.fillText(p.name, (p.x + 2) * scale, (p.y + 12) * scale);
                    ctx.font = `${6 * scale}px monospace`;
                    ctx.fillText(`${p.w}x${p.h}`, (p.x + 2) * scale, (p.y + 20) * scale);
                });

                const link = document.createElement('a');
                link.download = `WoodCut_Plan_${board.name}_Board_${boardIdx}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };

            const calculate = () => {
                setError(null);
                
                for (const p of pieces) {
                    if (p.width > board.width && p.width > board.height && p.height > board.width && p.height > board.height) {
                        setError(`Error: Piece "${p.name}" is larger than the board.`);
                        return;
                    }
                }

                const heuristics = [
                    (a, b) => (b.width * b.height) - (a.width * a.height), // Area Desc
                    (a, b) => Math.max(b.width, b.height) - Math.max(a.width, a.height), // Long Side Desc
                    (a, b) => Math.min(b.width, b.height) - Math.min(a.width, a.height), // Short Side Desc
                    (a, b) => b.width - a.width || b.height - a.height, // Width then Height
                    (a, b) => b.height - a.height || b.width - a.width, // Height then Width
                    (a, b) => (b.width + b.height) - (a.width + a.height), // Perimeter
                    (a, b) => (b.width / b.height) - (a.width / a.height), // Ratio (Skinny first)
                    (a, b) => (a.width / a.height) - (b.width / b.height)  // Ratio (Square first)
                ];

                let bestFullResult = null;
                let maxDensity = -1;

                for (const heuristic of heuristics) {
                    let currentRemaining = [];
                    pieces.forEach(p => {
                        for (let i = 0; i < p.quantity; i++) {
                            currentRemaining.push({ ...p, id: `${p.id}-${i}` });
                        }
                    });
                    currentRemaining.sort(heuristic);

                    const currentBoards = [];
                    let boardsUsed = 0;
                    let tempRemaining = [...currentRemaining];

                    const qty = parseInt(board.quantity) || 1;
                while (tempRemaining.length > 0 && boardsUsed < qty) {
                        const packer = new MaxRectsPacker(board.width, board.height, board.kerf);
                        const currentBoardPieces = [];
                        const nextRemaining = [];

                        for (const p of tempRemaining) {
                            const packed = packer.pack(p, p.allowRotation);
                            if (packed) {
                                currentBoardPieces.push(packed);
                            } else {
                                nextRemaining.push(p);
                            }
                        }

                        const usedArea = currentBoardPieces.reduce((sum, p) => sum + (p.w * p.h), 0);
                        const totalArea = board.width * board.height;
                        const maxRight = currentBoardPieces.length > 0 ? Math.max(...currentBoardPieces.map(p => p.x + p.w)) : 0;
                        const maxBottom = currentBoardPieces.length > 0 ? Math.max(...currentBoardPieces.map(p => p.y + p.h)) : 0;

                        currentBoards.push({
                            boardIndex: boardsUsed + 1,
                            pieces: currentBoardPieces,
                            usedArea,
                            totalArea,
                            wastePercent: ((totalArea - usedArea) / totalArea * 100).toFixed(1),
                            unusedStripW: Math.max(0, board.width - maxRight).toFixed(1),
                            unusedStripH: Math.max(0, board.height - maxBottom).toFixed(1),
                            offCuts: packer.freeRects.filter(r => r.w > 2 && r.h > 2)
                        });

                        tempRemaining = nextRemaining;
                        boardsUsed++;
                    }

                    // Score based on density and successfully packed pieces
                    const packedCount = currentRemaining.length - tempRemaining.length;
                    const avgEfficiency = currentBoards.length > 0 ? currentBoards.reduce((s, b) => s + (b.usedArea / b.totalArea), 0) / currentBoards.length : 0;
                    const score = (packedCount * 1000000) + (avgEfficiency * 1000); 

                    if (score > maxDensity) {
                        maxDensity = score;
                        bestFullResult = {
                            boards: currentBoards,
                            failed: tempRemaining,
                            totalUsedArea: currentBoards.reduce((sum, b) => sum + b.usedArea, 0),
                            totalArea: currentBoards.length * (board.width * board.height)
                        };
                    }
                }

                setResults(bestFullResult);

                    document.getElementById('results-section')?.scrollIntoView({ behavior: 'smooth' });

                                        <Icons.Layout className="text-wood-200 w-16 h-16 mb-6" />
                                        <h3 className="text-2xl font-bold wood-text mb-2">Ready to Optimize</h3>
                                        <p className="text-gray-400 max-w-sm">Enter your dimensions and let WoodCut Pro find the best layout for your project.</p>
                                    </div>
                                ) : (
                                    <div id="results-section" className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                            {[
                                                { label: 'Boards', value: results?.boards?.length || 0, icon: Icons.Square },
                                                { label: 'Pieces', value: results?.boards?.reduce((s, b) => s + (b.pieces?.length || 0), 0) || 0, icon: Icons.CheckCircle },
                                                { label: 'Total Waste', value: (results?.totalArea > 0) ? ((results.totalArea - results.totalUsedArea) / results.totalArea * 100).toFixed(1) + '%' : '0.0%', icon: Icons.Trash2 },
                                                { label: 'Failed', value: results?.failed?.length || 0, icon: Icons.AlertTriangle, color: (results?.failed?.length > 0) ? 'text-red-500' : 'text-green-500' }
                                            ].map((stat, i) => {
                                                const Icon = stat.icon;
                                                return (
                                                    <div key={i} className="bg-white p-6 rounded-2xl border border-wood-100 card-shadow">
                                                        <div className="flex items-center space-x-2 text-gray-400 mb-2 uppercase text-[10px] font-bold"><Icon className="w-3 h-3" /><span>{stat.label}</span></div>
                                        <div className={`text-2xl font-black ${stat.color || 'wood-text'}`}>{stat.value}</div>
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        {results?.boards?.map((b, idx) => (
                                            <div key={idx} className="bg-white rounded-3xl p-8 card-shadow border border-wood-100">
                                                <div className="flex justify-between items-center mb-6">
                                                    <div>
                                                        <h3 className="text-xl font-bold wood-text">Board #{b.boardIndex}: <span className="text-wood-600 uppercase">{board.name}</span></h3>
                                                        <span className="text-gray-400 font-normal text-sm block">Dimensions: {board.width} x {board.height} {board.unit}</span>
                                                        <div className="flex flex-wrap gap-4 mt-2 text-[10px] font-black uppercase">
                                                            <span className="bg-green-50 text-green-700 px-2 py-1 rounded">Used: {b.usedArea.toFixed(0)} {board.unit}Â²</span>
                                                            <span className="bg-amber-50 text-amber-700 px-2 py-1 rounded">Left: {(b.totalArea - b.usedArea).toFixed(0)} {board.unit}Â²</span>
                                                            <span className="bg-wood-50 text-wood-500 px-2 py-1 rounded">Unused L: {b.unusedStripW} {board.unit}</span>
                                                            <span className="bg-wood-50 text-wood-500 px-2 py-1 rounded">Unused W: {b.unusedStripH} {board.unit}</span>
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-col items-end">
                                                        <div className="flex space-x-2 mb-2">
                                                            <button onClick={() => downloadBoardImage(b.boardIndex)} className="text-[10px] bg-wood-900 text-white px-2 py-1 rounded font-bold hover:bg-black transition">Download Image</button>
                                                            <button onClick={() => addOffcutsToInventory(b.boardIndex)} className="text-[10px] bg-green-50 text-green-700 px-2 py-1 rounded font-bold hover:bg-green-100 transition">Save Off-cut</button>
                                                        </div>
                                                        <div className="text-right">
                                                            <span className="bg-wood-100 text-wood-700 px-3 py-1 rounded-full text-xs font-bold block mb-1">Efficiency: {(100 - parseFloat(b.wastePercent)).toFixed(1)}%</span>
                                                            <span className="text-[10px] text-gray-400 font-bold uppercase">Waste: {b.wastePercent}%</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="relative bg-[#d7ccc8] border-4 border-wood-900 rounded-lg shadow-2xl overflow-hidden" style={{ aspectRatio: `${board.width} / ${board.height}`, width: '100%', backgroundImage: 'url("https://www.transparenttextures.com/patterns/wood-pattern.png")' }}>
                                                    {b.pieces.map((p, i) => (
                                                        <div key={i} className="absolute border border-wood-950 bg-wood-700/80 text-white flex flex-col items-center justify-center overflow-hidden hover:bg-wood-600 transition group cursor-help" style={{ left: `${(p.x / board.width) * 100}%`, top: `${(p.y / board.height) * 100}%`, width: `${(p.w / board.width) * 100}%`, height: `${(p.h / board.height) * 100}%` }}>
                                                            <div className="text-[10px] md:text-xs font-black truncate px-1 drop-shadow-md">{p.name}</div>
                                                            <div className="text-[8px] md:text-[10px] opacity-70 font-mono">{p.w}x{p.h}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}

                                        <div className="bg-white rounded-3xl p-8 card-shadow border border-wood-100">
                                            <div className="flex justify-between items-center mb-6">
                                                <div className="flex items-center space-x-2"><Icons.List className="text-wood-600 w-6 h-6" /><h3 className="text-xl font-bold wood-text uppercase">Cutting Instructions</h3></div>
                                                <button onClick={() => window.print()} className="bg-wood-50 text-wood-700 px-4 py-2 rounded-xl text-sm font-bold hover:bg-wood-100 transition flex items-center space-x-2 no-print"><Icons.Printer className="w-4 h-4" /><span>Print</span></button>
                                            </div>

                                            <div className="mb-10 bg-wood-50/50 p-6 rounded-2xl border border-wood-100">
                                                <h4 className="text-xs font-black wood-text uppercase mb-4 flex items-center">
                                                    <Icons.CheckCircle className="w-4 h-4 mr-2 text-green-600" />
                                                    Project Totals Summary
                                                </h4>
                                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                                    {(() => {
                                                        if (!results || !results.boards) return null;
                                                        const summary = {};
                                                        results.boards.forEach(b => {
                                                            if (b.pieces) {
                                                                b.pieces.forEach(p => {
                                                                    summary[p.name] = (summary[p.name] || 0) + 1;
                                                                });
                                                            }
                                                        });
                                                        return Object.entries(summary).map(([name, count]) => (
                                                            <div key={name} className="bg-white p-3 rounded-xl border border-wood-100 shadow-sm flex justify-between items-center">
                                                                <span className="text-xs font-bold wood-text uppercase truncate pr-2">{name}</span>
                                                                <span className="bg-wood-900 text-white px-2.5 py-1 rounded-lg text-[10px] font-black">x{count}</span>
                                                            </div>
                                                        ));
                                                    })()}
                                                </div>
                                            </div>

                                            <div className="space-y-8">
                                                {results && results.boards && results.boards.map((b, idx) => (
                                                    <div key={idx} className="border-l-4 border-wood-200 pl-6 py-2">
                                                        <h4 className="font-black wood-text mb-4 text-sm">BOARD #{b.boardIndex} CUT LIST:</h4>
                                                        <div className="overflow-x-auto">
                                                            <table className="w-full text-xs text-left">
                                                                <thead className="bg-wood-50 text-wood-700 uppercase font-black">
                                                                    <tr>
                                                                        <th className="p-3">Piece</th>
                                                                        <th className="p-3">Qty</th>
                                                                        <th className="p-3">Position (X, Y)</th>
                                                                        <th className="p-3">Size</th>
                                                                        <th className="p-3">Rotated</th>
                                                                    </tr>
                                                                </thead>
                                                                <tbody className="divide-y divide-wood-50">
                                                                    {b.pieces.map((p, i) => (
                                                                        <tr key={i} className="hover:bg-wood-50/50">
                                                                            <td className="p-3 font-bold wood-text">{p.name}</td>
                                                                            <td className="p-3 font-bold text-wood-600">1</td>
                                                                            <td className="p-3 text-gray-500 font-mono">{p.x.toFixed(1)}, {p.y.toFixed(1)}</td>
                                                                            <td className="p-3 text-gray-500 font-mono">{p.w} x {p.h}</td>
                                                                            <td className="p-3">{p.rotated ? <span className="text-[10px] bg-amber-100 text-amber-700 px-2 py-0.5 rounded font-black uppercase">YES</span> : <span className="text-[10px] bg-gray-100 text-gray-400 px-2 py-0.5 rounded font-black uppercase">NO</span>}</td>
                                                                        </tr>
                                                                    ))}
                                                                </tbody>
                                                            </table>
                                                            <div className="mt-4 p-4 bg-wood-50 rounded-xl border border-wood-100">
                                                                <h5 className="text-[10px] font-black text-wood-400 uppercase mb-2">Off-cut Summary (Reusable pieces):</h5>
                                                                <ul className="grid grid-cols-2 gap-2">
                                                                    {b.offCuts.map((oc, i) => (
                                                                        <li key={i} className="text-xs text-wood-600 flex items-center space-x-2">
                                                                            <Icons.Scissors className="w-3 h-3 opacity-40" />
                                                                            <span>{oc.w.toFixed(1)} x {oc.h.toFixed(1)} {board.unit}</span>
                                                                        </li>
                                                                    ))}
                                                                    {parseFloat(b.unusedStripW) > 0 && (
                                                                        <li className="text-xs text-wood-800 font-bold flex items-center space-x-2">
                                                                            <Icons.ArrowRight className="w-3 h-3" />
                                                                            <span>End Strip: {b.unusedStripW} x {board.height} {board.unit}</span>
                                                                        </li>
                                                                    )}
                                                                </ul>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {showMaterialModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-in fade-in duration-300">
                            <div className="bg-white rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl animate-in zoom-in-95 duration-300">
                                <div className="wood-gradient p-6 text-white flex justify-between items-center">
                                    <div>
                                        <h3 className="text-xl font-bold uppercase tracking-tight">Material Library</h3>
                                        <p className="text-[10px] opacity-70">Manage your workshop wood inventory</p>
                                    </div>
                                    <button onClick={() => setShowMaterialModal(false)} className="bg-white/20 hover:bg-white/30 p-2 rounded-full transition"><Icons.X className="w-5 h-5" /></button>
                                </div>
                                <div className="p-6">
                                    <div className="mb-6">
                                        <button onClick={() => { saveMaterialToLibrary(); setShowMaterialModal(false); }} className="w-full py-3 border-2 border-dashed border-wood-200 rounded-xl text-wood-400 font-bold hover:bg-wood-50 hover:text-wood-600 transition mb-4">+ Add Current Wood to Library</button>
                                        <div className="space-y-3 max-h-[350px] overflow-y-auto pr-2">
                                            {materials.map((m, i) => (
                                                <div key={i} className="group flex justify-between items-center p-4 bg-wood-50 rounded-2xl border border-wood-100 hover:border-wood-400 transition cursor-pointer" onClick={() => { setBoard({ ...board, ...m }); setShowMaterialModal(false); }}>
                                                    <div className="flex items-center space-x-4">
                                                        <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center border border-wood-200 shadow-sm">
                                                            <Icons.Square className="text-wood-400 w-5 h-5" />
                                                        </div>
                                                        <div>
                                                            <div className="font-bold wood-text">{m.name}</div>
                                                            <div className="text-[10px] text-gray-400">{m.width} x {m.height} {board.unit}</div>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center space-x-2">
                                                        <span className="text-[10px] font-bold text-wood-400 opacity-0 group-hover:opacity-100 transition">Select</span>
                                                        <button onClick={(e) => { e.stopPropagation(); removeMaterialFromLibrary(m.name); }} className="p-2 text-gray-300 hover:text-red-500 transition"><Icons.Trash2 className="w-4 h-4" /></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
                );
        };


        const HistoryPage = ({ history, setHistory, setView, loadTemplate }) => {
            return (
                <div className="py-12 bg-wood-50 min-h-screen">
                    <div className="container mx-auto px-4">
                        <div className="flex justify-between items-center mb-12">
                            <div>
                                <h1 className="text-4xl font-black wood-text tracking-tighter uppercase mb-2">Workshop History</h1>
                                <p className="text-gray-400 font-medium">Your permanent record of finished projects</p>
                            </div>
                            <button onClick={() => setView('optimizer')} className="px-6 py-2 bg-white border border-wood-100 rounded-xl font-bold wood-text hover:bg-wood-50 transition">Back to Optimizer</button>
                        </div>

                        {(!history || history.length === 0) ? (
                            <div className="bg-white rounded-3xl p-20 card-shadow border border-wood-100 flex flex-col items-center justify-center text-center">
                                <Icons.Layers className="text-wood-200 w-20 h-20 mb-6 opacity-30" />
                                <h3 className="text-2xl font-bold wood-text mb-2">No Finished Projects Yet</h3>
                                <p className="text-gray-400 max-w-sm mb-8">Once you finish a job in the optimizer, it will be safely archived here forever.</p>
                                <button onClick={() => setView('optimizer')} className="px-8 py-3 wood-gradient text-white rounded-xl font-bold shadow-lg">Start First Project</button>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {(history || []).map((project, i) => (
                                    <div key={project.id || i} className="bg-white rounded-3xl overflow-hidden card-shadow border border-wood-100 group transition hover:-translate-y-1">
                                        <div className="p-8">
                                            <div className="flex justify-between items-start mb-4">
                                                <div>
                                                    <div className="text-[10px] font-black text-wood-400 uppercase tracking-widest mb-1">{project.date ? new Date(project.date).toLocaleDateString() : 'Recent'}</div>
                                                    <h3 className="text-xl font-black wood-text uppercase leading-tight">{project?.projectName || project?.name || 'Untitled Project'}</h3>
                                                </div>
                                                <button onClick={() => { if(confirm('Delete permanently?')) setHistory(prev => prev.filter(p => p.id !== project.id)); }} className="text-gray-300 hover:text-red-500 transition"><Icons.Trash2 className="w-5 h-5" /></button>
                                            </div>
                                            
                                            <div className="grid grid-cols-2 gap-4 py-4 border-y border-wood-50 mb-4">
                                                <div>
                                                    <div className="text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">Material</div>
                                                    <div className="text-xs font-bold wood-text truncate">{project.materialName || 'Custom'}</div>
                                                </div>
                                                <div>
                                                    <div className="text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">Boards Used</div>
                                                    <div className="text-xs font-bold wood-text">{project.boardsCount || 0}</div>
                                                </div>
                                                <div>
                                                    <div className="text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">Waste</div>
                                                    <div className="text-xs font-bold text-red-500">{project.waste || 0}%</div>
                                                </div>
                                                <div>
                                                    <div className="text-[8px] font-bold text-gray-400 uppercase tracking-widest mb-1">Dimensions</div>
                                                    <div className="text-xs font-bold wood-text">{project.boardWidth || 0} x {project.boardHeight || 0} {project.unit || ''}</div>
                                                </div>
                                            </div>
                                            
                                            <button onClick={() => { loadTemplate(project); setView('optimizer'); }} className="w-full py-3 bg-wood-50 text-wood-700 rounded-xl font-bold hover:bg-wood-900 hover:text-white transition flex items-center justify-center space-x-2">
                                                <Icons.Maximize className="w-4 h-4" />
                                                <span>Re-open & Edit</span>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };


        const App = () => {
            const [view, setView] = useState('home');
            
            const [materials, setMaterials] = useState(() => {
                try {
                    const saved = localStorage.getItem('woodcut_materials');
                    return saved ? JSON.parse(saved) : [
                        { name: 'Oak Plywood', width: 244, height: 122, kerf: 0.3 },
                        { name: 'MDF 18mm', width: 244, height: 122, kerf: 0.3 }
                    ];
                } catch(e) { return [{ name: 'Oak Plywood', width: 244, height: 122, kerf: 0.3 }, { name: 'MDF 18mm', width: 244, height: 122, kerf: 0.3 }]; }
            });

            const [customTemplates, setCustomTemplates] = useState(() => {
                try {
                    const saved = localStorage.getItem('woodcut_templates');
                    return (saved ? JSON.parse(saved) : []).filter(t => t !== null);
                } catch(e) { return []; }
            });

            const [history, setHistory] = useState(() => {
                try {
                    const saved = localStorage.getItem('woodcut_history');
                    return (saved ? JSON.parse(saved) : []).filter(t => t !== null);
                } catch(e) { return []; }
            });


            const [projectName, setProjectName] = useState('New Project');
            const [board, setBoard] = useState({ ...materials[0], quantity: 5, unit: 'cm' });
            const [pieces, setPieces] = useState([
                { id: '1', name: 'Shelf A', width: 80, height: 30, quantity: 4, allowRotation: true, completed: false },
                { id: '2', name: 'Side Panel', width: 120, height: 40, quantity: 2, allowRotation: true, completed: false }
            ]);

            useEffect(() => { localStorage.setItem('woodcut_materials', JSON.stringify(materials)); }, [materials]);
            useEffect(() => { localStorage.setItem('woodcut_templates', JSON.stringify(customTemplates)); }, [customTemplates]);
            useEffect(() => { localStorage.setItem('woodcut_history', JSON.stringify(history)); }, [history]);

            return (
                <div className="min-h-screen">
                    <Header currentView={view} setView={setView} />
                    {view === 'home' && <Hero onStart={() => setView('optimizer')} />}
                    {view === 'optimizer' && (
                        <Optimizer 
                            setView={setView} 
                            customTemplates={customTemplates} 
                            setCustomTemplates={setCustomTemplates} 
                            history={history}
                            setHistory={setHistory}
                            materials={materials} 
                            setMaterials={setMaterials}
                            projectName={projectName}
                            setProjectName={setProjectName}
                            board={board}
                            setBoard={setBoard}
                            pieces={pieces}
                            setPieces={setPieces}
                        />
                    )}
                    {view === 'history' && (
                        <HistoryPage 
                            history={history} 
                            setHistory={setHistory} 
                            setView={setView} 
                            loadTemplate={(t) => {
                                setProjectName(t.projectName || t.name);
                                setBoard(t.board);
                                setPieces(t.pieces);
                                setView('optimizer');
                            }}
                        />
                    )}
                    
                    <footer className="bg-gray-100 py-6 no-print border-t border-gray-200">
                        <div className="container mx-auto px-4">
                            <div className="flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
                                <div className="flex items-center space-x-2">
                                    <Icons.Saw className="text-[#714B67] w-4 h-4" />
                                    <span className="text-sm font-bold text-gray-700">Wood Optimizer</span>
                                </div>
                                <div className="text-[11px] text-gray-400">
                                    &copy; 2026 Integrated with Odoo ERP
                                </div>
                                <div className="flex space-x-6 text-[11px] font-bold text-[#714B67]">
                                    <button onClick={() => { if(confirm('This will delete ALL your saved projects and materials. Continue?')) { localStorage.clear(); window.location.reload(); } }} className="hover:text-red-600 transition">Reset Workshop Data</button>
                                </div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
